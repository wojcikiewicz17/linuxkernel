name: Android Native CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  JAVA_VERSION: "17"
  NDK_VERSION: "26.3.11579264"
  GRADLE_VERSION: "8.14.3"

jobs:
  build-debug:
    name: Build Debug (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]
    env:
      ABI: ${{ matrix.abi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Beta source selftest
        working-directory: android-native
        run: gradle --no-daemon :app:betaSourceSelfTest

      - name: Build debug APK
        working-directory: android-native
        run: gradle --no-daemon clean :app:assembleDebug -PciAbi=${ABI}

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ matrix.abi }}-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          path: |
            **/build/outputs/apk/debug/*${{ matrix.abi }}*.apk
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: error

  build-release-unsigned:
    name: Build Release Unsigned (${{ matrix.abi }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]
    env:
      ABI: ${{ matrix.abi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Beta source selftest
        working-directory: android-native
        run: gradle --no-daemon :app:betaSourceSelfTest

      - name: Build unsigned release APK
        working-directory: android-native
        run: gradle --no-daemon clean :app:assembleRelease -PciAbi=${ABI}

      - name: Upload unsigned release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned-${{ matrix.abi }}-${{ github.ref_type == 'tag' && github.ref_name || github.sha }}
          path: |
            **/build/outputs/apk/release/*unsigned*.apk
            **/build/outputs/apk/release/*.apk
          if-no-files-found: error

  build-release-signed:
    name: Build Release Signed
    runs-on: ubuntu-latest
    needs: build-release-unsigned
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/settings.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.NDK_VERSION }}

      - name: Install NDK
        run: sdkmanager "ndk;${NDK_VERSION}"

      - name: Prepare keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64"
          echo "$KEYSTORE_BASE64" | base64 --decode > release.keystore

      - name: Beta source selftest
        working-directory: android-native
        run: gradle --no-daemon :app:betaSourceSelfTest

      - name: Build signed release APK
        working-directory: android-native
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          gradle --no-daemon clean :app:assembleRelease -PrequireReleaseSigning=true \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=$STORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Verify signed APK exists
        run: |
          test -n "$(find android-native -type f -path '*build/outputs/apk/release/*.apk' ! -name '*unsigned*' | head -n 1)"

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-signed-${{ github.ref_name }}
          path: |
            **/build/outputs/apk/release/*.apk
            !**/build/outputs/apk/release/*unsigned*.apk
          if-no-files-found: error
