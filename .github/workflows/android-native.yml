name: android-native-build

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  pull_request:
    paths:
      - 'android-native/**'
      - '.github/workflows/android-native.yml'
  workflow_dispatch:
permissions:
  contents: read

env:
  JAVA_VERSION: '17'
  ANDROID_NDK_VERSION: '26.3.11579264'
  ANDROID_CMAKE_VERSION: '3.22.1'
  ARTIFACT_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('sha-{0}', github.sha) }}

jobs:
  build-debug:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
            ~/Android/Sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android components
        run: |
          yes | sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Ensure Gradle Wrapper
        run: |
          if [ ! -f ./gradlew ]; then
            gradle wrapper --gradle-version 8.7
          fi
          chmod +x ./gradlew

      - name: Build debug APK (${{ matrix.abi }})
        run: ./gradlew --no-daemon :app:assembleDebug -PciAbi=${{ matrix.abi }}

      - name: Stage debug APK (${{ matrix.abi }})
        run: |
          mkdir -p dist/debug/${{ matrix.abi }}
          cp app/build/outputs/apk/debug/*.apk dist/debug/${{ matrix.abi }}/

      - name: Upload debug APK artifact (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: android-native-debug-${{ matrix.abi }}-${{ env.ARTIFACT_VERSION }}
          path: android-native/dist/debug/${{ matrix.abi }}/*.apk
          if-no-files-found: error

  build-release-unsigned:
    runs-on: ubuntu-latest
    needs: build-debug
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
            ~/Android/Sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android components
        run: |
          yes | sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Ensure Gradle Wrapper
        run: chmod +x ./gradlew

      - name: Build release unsigned APK (${{ matrix.abi }})
        run: ./gradlew --no-daemon :app:assembleRelease -PciAbi=${{ matrix.abi }}

      - name: Stage release unsigned APK (${{ matrix.abi }})
        run: |
          mkdir -p dist/release-unsigned/${{ matrix.abi }}
          cp app/build/outputs/apk/release/*-unsigned.apk dist/release-unsigned/${{ matrix.abi }}/

      - name: Upload release unsigned APK artifact (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: android-native-release-unsigned-${{ matrix.abi }}-${{ env.ARTIFACT_VERSION }}
          path: android-native/dist/release-unsigned/${{ matrix.abi }}/*-unsigned.apk
          if-no-files-found: error

  build-release-signed:
    runs-on: ubuntu-latest
    needs: build-release-unsigned
    if: ${{ github.event_name != 'pull_request' }}
    strategy:
      fail-fast: false
      matrix:
        abi: [armeabi-v7a, arm64-v8a]

    defaults:
      run:
        working-directory: android-native

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android-native/**/*.gradle*', 'android-native/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Android NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/android-sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
            ~/Android/Sdk/ndk/${{ env.ANDROID_NDK_VERSION }}
          key: ${{ runner.os }}-ndk-${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android components
        run: |
          yes | sdkmanager --install \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;${ANDROID_NDK_VERSION}" \
            "cmake;${ANDROID_CMAKE_VERSION}"

      - name: Ensure signing secrets are present
        run: |
          test -n "${{ secrets.KEYSTORE_BASE64 }}"
          test -n "${{ secrets.KEY_ALIAS }}"
          test -n "${{ secrets.KEY_PASSWORD }}"
          test -n "${{ secrets.STORE_PASSWORD }}"

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/android-ci.keystore

      - name: Build release signed APK (${{ matrix.abi }})
        env:
          ANDROID_KEYSTORE_PATH: /tmp/android-ci.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:assembleRelease -PciAbi=${{ matrix.abi }}

      - name: Stage release signed APK (${{ matrix.abi }})
        run: |
          mkdir -p dist/release-signed/${{ matrix.abi }}
          cp app/build/outputs/apk/release/*.apk dist/release-signed/${{ matrix.abi }}/
          rm -f dist/release-signed/${{ matrix.abi }}/*-unsigned.apk

      - name: Verify signed APKs (${{ matrix.abi }})
        run: |
          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          for apk in dist/release-signed/${{ matrix.abi }}/*.apk; do
            [ -f "$apk" ] || continue
            "$APKSIGNER" verify --verbose "$apk"
          done

      - name: Upload release signed APK artifact (${{ matrix.abi }})
        uses: actions/upload-artifact@v4
        with:
          name: android-native-release-signed-${{ matrix.abi }}-${{ env.ARTIFACT_VERSION }}
          path: android-native/dist/release-signed/${{ matrix.abi }}/*.apk
          if-no-files-found: error
